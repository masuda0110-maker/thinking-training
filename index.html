<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>思考クエスト - ビジネス思考力RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- ヘッダー -->
        <header class="header">
            <div class="header-inner">
                <h1 class="logo" onclick="showHome()">⚔️ 思考クエスト</h1>
                <div class="player-status">
                    <span class="player-title" id="playerTitle">見習い冒険者</span>
                    <span class="player-level" id="playerLevel">Lv.1</span>
                    <div class="exp-bar-mini">
                        <div class="exp-fill-mini" id="expFillMini" style="width:0%"></div>
                    </div>
                </div>
            </div>
        </header>

        <!-- ホーム画面 -->
        <main id="homeScreen" class="container">
            <!-- プレイヤー情報 -->
            <section class="player-card">
                <div class="player-avatar" id="playerAvatar">🧙</div>
                <div class="player-info">
                    <div class="player-name-row">
                        <span class="player-title-large" id="playerTitleLarge">見習い冒険者</span>
                        <span class="player-lv" id="playerLvLarge">Lv.1</span>
                    </div>
                    <div class="exp-bar">
                        <div class="exp-fill" id="expFill" style="width:0%"></div>
                    </div>
                    <div class="exp-text" id="expText">EXP: 0 / 100</div>
                    <div class="player-stats">
                        <span id="statCleared">🏆 クリア: 0</span>
                        <span id="statCorrect">✅ 正答率: --</span>
                        <span id="statStreak">🔥 連続正解: 0</span>
                    </div>
                </div>
            </section>

            <!-- ワールドマップ -->
            <section class="world-map">
                <h2 class="section-title">⚔️ ダンジョン選択</h2>
                <div class="dungeon-grid" id="dungeonGrid"></div>
            </section>
        </main>

        <!-- フロア選択画面 -->
        <main id="floorScreen" class="container" style="display:none;">
            <button class="back-btn" onclick="showHome()">← ワールドマップへ</button>
            <div class="dungeon-header" id="dungeonHeader"></div>
            <div class="floor-list" id="floorList"></div>
        </main>

        <!-- バトル画面 -->
        <main id="battleScreen" class="container" style="display:none;">
            <div class="battle-hud">
                <button class="back-btn" onclick="fleeBattle()">🏃 撤退</button>
                <div class="battle-meta">
                    <span id="battleCategory" class="battle-category"></span>
                    <span id="battleProgress" class="battle-progress"></span>
                </div>
            </div>

            <!-- エネミー表示 -->
            <div class="enemy-area" id="enemyArea">
                <div class="enemy-sprite" id="enemySprite"></div>
                <div class="enemy-name" id="enemyName"></div>
                <div class="enemy-hp-bar">
                    <div class="enemy-hp-fill" id="enemyHpFill" style="width:100%"></div>
                </div>
            </div>

            <!-- メッセージウィンドウ -->
            <div class="message-window" id="messageWindow">
                <div class="scenario-text" id="scenarioText"></div>
                <div class="question-text" id="questionText"></div>
            </div>

            <!-- コマンド（回答）エリア -->
            <div class="command-area" id="commandArea"></div>

            <!-- フィードバック -->
            <div class="battle-feedback" id="battleFeedback" style="display:none;"></div>

            <!-- アクション -->
            <div class="battle-actions" id="battleActions"></div>
        </main>

        <!-- リザルト画面 -->
        <main id="resultScreen" class="container" style="display:none;">
            <div class="result-card">
                <div class="result-banner" id="resultBanner"></div>
                <div class="result-body">
                    <div class="result-score-area" id="resultScoreArea"></div>
                    <div class="exp-gain-area" id="expGainArea"></div>
                    <div class="result-detail" id="resultDetail"></div>
                    <div class="result-actions">
                        <button class="btn btn-primary" onclick="retryBattle()">🔄 再挑戦</button>
                        <button class="btn btn-secondary" onclick="showFloors(currentCategory)">📋 フロア選択</button>
                        <button class="btn btn-secondary" onclick="showHome()">🗺️ マップへ</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- レベルアップ演出 -->
        <div class="levelup-overlay" id="levelupOverlay" style="display:none;">
            <div class="levelup-card">
                <div class="levelup-icon">⚡</div>
                <h2>LEVEL UP!</h2>
                <div class="levelup-level" id="levelupLevel"></div>
                <div class="levelup-title" id="levelupTitle"></div>
                <button class="btn btn-primary" onclick="closeLevelUp()">OK</button>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
